name: CI/CD L3GL Pipeline (Final Fix)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task-api
        uses: actions/checkout@v4
        with:
          path: task-api

      - name: Checkout task-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-core
          path: task-core

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. On installe le Core normalement (besoin d'internet pour les libs standards)
      - name: Install task-core
        run: |
          cd task-core
          mvn clean install -DskipTests

      # 2. ÉTAPE CRUCIALE : On build l'API en mode OFFLINE (-o)
      # Cela force Maven à utiliser le task-core qu'on vient d'installer dans .m2
      # sans essayer de contacter ton Nexus localhost:8081
      - name: Build task-api (Offline Mode)
        run: |
          cd task-api
          mvn clean package -DskipTests -o

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd task-api
          docker build -t l3gldev/task-api:latest .
          docker push l3gldev/task-api:latest