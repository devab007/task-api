name: CI/CD L3GL Pipeline (Ultimate Fix)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task-api
        uses: actions/checkout@v4
        with:
          path: task-api

      - name: Checkout task-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-core
          path: task-core

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Création d'un settings.xml qui ignore ton Nexus local
      - name: Create Custom Maven Settings
        run: |
          cat <<EOF > settings.xml
          <settings>
            <mirrors>
              <mirror>
                <id>central-only</id>
                <mirrorOf>external:*</mirrorOf>
                <url>https://repo.maven.apache.org/maven2</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      # 2. On installe le Core proprement
      - name: Install task-core
        run: |
          cd task-core
          # On génère un JAR léger et on l'installe
          mvn clean install -DskipTests -s ../settings.xml

      # 3. On build l'API en forçant l'utilisation du Core qu'on vient de compiler
      - name: Build task-api
        run: |
          cd task-api
          # On utilise -s pour ignorer ton Nexus et on force la version si besoin
          mvn clean package -DskipTests -s ../settings.xml

      # 4. Connexion Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build et Push
      - name: Build and push Docker image
        run: |
          cd task-api
          docker build -t l3gldev/task-api:latest .
          docker push l3gldev/task-api:latest