name: CI/CD L3GL Pipeline (The Solution)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task-api
        uses: actions/checkout@v4
        with:
          path: task-api

      - name: Checkout task-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-core
          path: task-core

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install task-core
        run: |
          cd task-core
          mvn clean install -DskipTests

      - name: Clean Nexus Config from POM
        run: |
          cd task-api
          # Cette commande supprime toute la section <repositories> du pom.xml 
          # pour forcer Maven à utiliser le dépôt central standard.
          sed -i '/<repositories>/,/<\/repositories>/d' pom.xml

      - name: Build task-api
        run: |
          cd task-api
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd task-api
          docker build -t l3gldev/task-api:latest .
          docker push l3gldev/task-api:latest