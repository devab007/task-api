name: CI/CD L3GL Pipeline (Final Fix)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task-api
        uses: actions/checkout@v4
        with:
          path: task-api

      - name: Checkout task-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-core
          path: task-core

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install task-core Dependency
        run: |
          cd task-core
          mvn clean package -DskipTests
          # On installe le fichier JAR sous l'identité 0.3.0 demandée par l'API
          mvn install:install-file \
            -Dfile=target/task-core-0.6.0.jar \
            -DgroupId=sn.isi.l3gl.core \
            -DartifactId=task-core \
            -Dversion=0.3.0 \
            -Dpackaging=jar

      - name: Clean Nexus Config
        run: |
          cd task-api
          sed -i '/<repositories>/,/<\/repositories>/d' pom.xml
          sed -i '/<distributionManagement>/,/<\/distributionManagement>/d' pom.xml

      - name: Build task-api
        run: |
          cd task-api
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd task-api
          docker build -t l3gldev/task-api:latest .
          docker push l3gldev/task-api:latest