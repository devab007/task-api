name: CI/CD L3GL Pipeline (Multi-Repo)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task-api (Current Repo)
        uses: actions/checkout@v4
        with:
          path: task-api

      # ÉTAPE CLÉ : On clone le dépôt task-core à côté de task-api
      - name: Checkout task-core (Dependency Repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-core
          path: task-core
          # Note: Si task-core est PRIVE, il faudra un Personal Access Token (PAT)
          # token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. On entre dans le dossier cloné du Core et on l'installe dans le .m2 local du runner
      - name: Install task-core Dependency
        run: |
          cd task-core
          mvn clean install -DskipTests

      # 2. On compile l'API (qui va maintenant trouver le Core dans le .m2)
      - name: Build task-api
        run: |
          cd task-api
          mvn clean package -DskipTests

      # 3. Connexion au Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build et Push de l'image Docker
      - name: Build and push Docker image
        run: |
          cd task-api
          docker build -t l3gldev/task-api:latest .
          docker push l3gldev/task-api:latest